services:
  little-tyke:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8081:8081"
      - "9001:9001"
    environment:
      LITTLE_TYKE_OLLAMA_URL: "http://host.docker.internal:11434"
      LITTLE_TYKE_ADDR: ":8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
